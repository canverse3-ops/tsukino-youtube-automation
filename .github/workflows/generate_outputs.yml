name: Generate outputs

on:
  push:
    branches:
      - '**'
    paths:
      - '01_script/script.md'
      - 'src/main.py'
      - '.github/workflows/generate_outputs.yml'

permissions:
  contents: write

jobs:
  generate-outputs:
    name: Generate 02_output files
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate outputs
        run: python src/main.py

      - name: Commit generated outputs
        run: |
          if git diff --quiet -- 02_output; then
            echo "No changes in 02_output."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 02_output
          git commit -m "chore: generate output files"
          git push
